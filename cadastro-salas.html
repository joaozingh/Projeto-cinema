<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Salas</title>

    <link rel="stylesheet" href="sty.css">
</head>

<body>

    <h2>Cadastro de Salas 🎬</h2>

    <form id="formSala">

        <!-- Nome da Sala -->
        <label>Nome da Sala:</label>
        <input type="text" id="nome" required>

        <!-- Capacidade -->
        <label>Capacidade:</label>
        <input type="number" id="capacidade" required>

        <!-- Tipo -->
        <label>Tipo:</label>
        <select id="tipo" required>
            <option value="">Selecione</option>
            <option>2D</option>
            <option>3D</option>
            <option>IMAX</option>
        </select>

        <!-- Mensagem -->
        <p id="mensagem"></p>

        <button type="submit">Salvar Sala</button>

    </form>

<a href="index.html" class="btn-voltar">Voltar ao Menu</a>

<script src="cadastro-salas.js"></script>

</body>
</html>
