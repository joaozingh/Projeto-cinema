<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Filmes</title>

 <link rel="stylesheet" href="sty.css">

    </head>

    <body>


        <h2>Cadastro de Filmes </h2>
        <form id="formFilme">
            

            <!--Título-->
            <label>Título:</label>
            <input type="text" id="titulo" required>
           
            <!--Data-->
            <label>Data:</label>
            <input type="date" id="data" required>


        <!-- Gênero -->
        <label>Gênero:</label>
        <input type="text" id="genero" required>

        <!-- Descrição -->
        <label>Descrição:</label>
        <textarea id="descricao" required></textarea>

        <!-- Classificação -->
        <label>Classificação Indicativa:</label>
        <select id="classificacao" required>
            <option value="">Selecione</option>
            <option>Livre</option>
            <option>10+</option>
            <option>12+</option>
            <option>14+</option>
            <option>16+</option>
            <option>18+</option>
        </select>

        <!-- Duração -->
        <label>Duração (minutos):</label>
        <input type="number" id="duracao" required>

        <!-- Data -->
        <label>Data de Estreia:</label>
        <input type="date" id="data" required>

        <button type="submit">Salvar Filme</button>
        </form>

     <a href="index.html" class="btn-voltar">Voltar ao Menu</a>


        <script src="cadastro-filme.js"></script>
</body>
</html>
